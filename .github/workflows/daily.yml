name: Daily KB Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"

permissions:
  contents: write

env:
  ARTICLE_LIMIT: "50"
  SUPPORT_BASE_URL: "https://support.optisigns.com"
  HELP_CENTER_LOCALE: "en-us"
  GEMINI_FILE_SEARCH_STORE_DISPLAY_NAME: "daily-crawl-store"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper and Gemini uploader
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Upload last run log
        uses: actions/upload-artifact@v4
        with:
          name: last-run-log
          path: logs/last_run.json

      - name: Commit changed manifest, markdown, logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data logs
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily kb sync"
            git push
          fi
